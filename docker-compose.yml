services:
  postgres:
    image: postgres:16-alpine
    container_name: desafio_effecti_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-desafio_effecti}
      POSTGRES_USER: ${DB_USERNAME:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-effecti2026!}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-erp_user} -d ${DB_DATABASE:-desafio_effecti}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - desafio_effecti_network

  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desafio_effecti_php
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    networks:
      - desafio_effecti_network

  nginx:
    image: nginx:alpine
    container_name: desafio_effecti_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/app/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - desafio_effecti_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: desafio_effecti_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - desafio_effecti_network

networks:
  desafio_effecti_network:
    driver: bridge

volumes:
  postgres_data:
